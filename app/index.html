<!DOCTYPE html>
<html lang="ru" data-theme="light">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
<meta name="theme-color" content="#e7e3d8">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<title>Growth</title>
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="apple-touch-icon.png">
<meta name="apple-mobile-web-app-title" content="Growth">
<link rel="stylesheet" href="fonts/fonts.css">
<script src="vendor/js-yaml.min.js"></script>
<script src="vendor/marked.min.js"></script>
<style>
  :root{
    --grotesk:"Hanken Grotesk",system-ui,sans-serif;
    --mono:"JetBrains Mono",ui-monospace,monospace;
    --maxw:680px;
  }
  /* ——— СВЕТЛАЯ: тёплая бумага ——— */
  html[data-theme="light"]{
    --bg:#e7e3d8; --ink:#181612; --muted:#4d473c; --faint:#8a8273;
    --line:#181612; --line-soft:#c3bdaf; --accent:#cf3a1a; --card:#ece8dd;
    --tab-bg:#e7e3d8; --tab-active-bg:#181612; --tab-active-fg:#e7e3d8; --on-accent:#fdf6ee;
  }
  /* ——— ТЁМНАЯ: фиолетово-чёрная, мягкий сиреневый ——— */
  html[data-theme="dark"]{
    --bg:#0c0a11; --ink:#e9e6f2; --muted:#9d96b0; --faint:#615b76;
    --line:#2a2438; --line-soft:#221d2e; --accent:#a89cea; --card:#100d18;
    --tab-bg:#15121e; --tab-active-bg:#a89cea; --tab-active-fg:#15101e; --on-accent:#15101e;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  html,body{height:100%}
  body{font-family:var(--grotesk);background:var(--bg);color:var(--ink);
    -webkit-font-smoothing:antialiased;line-height:1.45;min-height:100dvh;transition:background .25s,color .25s}
  html{-webkit-text-size-adjust:100%}
  body{overscroll-behavior:none;-webkit-tap-highlight-color:transparent;-webkit-touch-callout:none;touch-action:manipulation;user-select:none;-webkit-user-select:none}
  /* текстовый контент оставляем выделяемым/копируемым */
  .doc,.tr,.ex,.note-line,.ntext,.word,input,textarea{user-select:text;-webkit-user-select:text}
  .wrap{max-width:var(--maxw);margin:0 auto;padding:max(22px,env(safe-area-inset-top)) 22px 64px}
  .mono{font-family:var(--mono)}

  header.app{display:flex;align-items:flex-start;justify-content:space-between;gap:14px;margin-bottom:18px;animation:rise .45s ease both}
  .brand{font-family:var(--grotesk);font-weight:800;font-size:34px;letter-spacing:-1px;line-height:.95}
  .brand .dot{color:var(--accent)}
  .brand-sub{font-family:var(--mono);font-size:11px;letter-spacing:2px;color:var(--faint);margin-top:6px;text-transform:uppercase}
  .head-actions{display:flex;gap:8px;flex-shrink:0}
  .hbtn{font-family:var(--mono);font-size:11px;letter-spacing:1px;text-transform:uppercase;
    background:transparent;color:var(--ink);border:1.5px solid var(--line);padding:9px 12px;cursor:pointer;transition:.15s;white-space:nowrap}
  .hbtn:hover{background:var(--ink);color:var(--bg)}
  .rule{height:0;border:0;border-top:2.5px solid var(--line);margin:6px 0 20px}

  .tabs{display:flex;gap:10px;overflow-x:auto;padding-bottom:6px;margin-bottom:26px;scrollbar-width:none}
  .tabs::-webkit-scrollbar{display:none}
  .tab{flex:0 0 auto;display:flex;align-items:center;gap:9px;font-family:var(--mono);font-size:13px;
    letter-spacing:1px;text-transform:uppercase;background:var(--tab-bg);color:var(--muted);
    border:1.5px solid var(--line);padding:13px 17px;cursor:pointer;transition:.15s;white-space:nowrap;animation:rise .45s ease both}
  .tab .ti{font-size:16px}
  .tab:hover{color:var(--ink)}
  .tab.active{background:var(--tab-active-bg);color:var(--tab-active-fg);border-color:var(--tab-active-bg)}

  .sec{display:flex;align-items:center;justify-content:space-between;gap:12px;margin-bottom:2px;animation:fade .3s ease both}
  .sec-l{display:flex;align-items:center;gap:13px}
  .sec-ico{font-size:26px}
  .sec h2{font-family:var(--grotesk);font-weight:800;font-size:30px;letter-spacing:-.5px;text-transform:uppercase}
  .sec-count{font-family:var(--mono);font-size:14px;color:var(--accent);font-weight:500;white-space:nowrap}
  .rule-thin{height:0;border:0;border-top:1.5px solid var(--line);margin:14px 0 20px}

  .cards{border:1.5px solid var(--line);animation:fade .3s ease both}
  .card{padding:17px 18px;border-bottom:1.5px solid var(--line);background:var(--card)}
  .card:last-child{border-bottom:0}
  .card-top{display:flex;align-items:baseline;justify-content:space-between;gap:10px;margin-bottom:6px}
  .word{font-family:var(--grotesk);font-weight:800;font-size:24px;letter-spacing:-.5px}
  .pos{font-family:var(--mono);font-size:11px;color:var(--faint);text-transform:uppercase;margin-left:8px;letter-spacing:.5px}
  .tag{font-family:var(--mono);font-size:11px;letter-spacing:1px;white-space:nowrap}
  .tag.mastered{color:var(--accent)}
  .tag.learning{color:var(--faint)}
  .tr{font-size:15px;color:var(--ink);margin-bottom:5px}
  .ex{font-family:var(--mono);font-size:12.5px;color:var(--muted);line-height:1.5}
  .ex .gt{color:var(--accent);font-weight:700;margin-right:7px}
  .note-line{font-family:var(--mono);font-size:11.5px;color:var(--faint);margin-top:6px}
  .search{width:100%;background:var(--card);border:1.5px solid var(--line);color:var(--ink);padding:12px 14px;font-family:var(--mono);font-size:13px;transition:.15s;-webkit-appearance:none}
  .search:focus{outline:none;border-color:var(--accent)}
  .search::placeholder{color:var(--faint)}
  .vtoolbar{display:flex;gap:8px;margin-bottom:16px}
  .vtoolbar .search{flex:1}
  .addbtn{flex:0 0 auto;background:var(--accent);color:var(--on-accent);border:1.5px solid var(--accent);padding:0 16px;font-family:var(--mono);font-size:18px;font-weight:700;cursor:pointer;line-height:1;transition:.15s}
  .addbtn:hover{filter:brightness(1.05)}
  .addform{border:1.5px solid var(--line);background:var(--card);padding:16px;margin-bottom:18px;animation:fade .2s ease both}
  .addform .field{margin-bottom:12px}
  .addform .grow{display:flex;gap:8px}
  .addform .grow .field{flex:1}
  .chk{display:flex;align-items:center;gap:8px;font-family:var(--mono);font-size:12px;color:var(--muted);cursor:pointer;margin-bottom:14px;user-select:none}
  .formbtns{display:flex;gap:8px}
  .formbtns .btn{margin-top:0}
  .btn.ghost{background:transparent;color:var(--ink);border-color:var(--line)}
  .card-right{display:flex;align-items:center;gap:12px;flex:0 0 auto}
  .del{background:none;border:none;color:var(--faint);font-family:var(--mono);font-size:19px;line-height:1;cursor:pointer;padding:0 2px;transition:.15s}
  .del:hover{color:var(--accent)}

  .progress-label{font-family:var(--mono);font-size:14px;color:var(--ink);margin-bottom:11px}
  .progress-label b{color:var(--accent);font-weight:500}
  .segbar{display:flex;gap:3px;margin-bottom:24px}
  .seg{flex:1;height:18px;border:1.5px solid var(--line)}
  .seg.on{background:var(--accent);border-color:var(--accent)}
  .checklist{display:flex;flex-direction:column;gap:18px;animation:fade .3s ease both}
  .citem{display:flex;gap:14px;align-items:flex-start}
  .cbox{font-family:var(--mono);font-size:14px;font-weight:700;flex:0 0 auto;line-height:1.4}
  .cbox.done{color:var(--accent)}
  .cbox.todo{color:var(--faint)}
  .ctext{font-family:var(--mono);font-size:14px;letter-spacing:.5px;text-transform:uppercase;line-height:1.4}
  .citem.todo .ctext{color:var(--faint)}

  .filelist{border:1.5px solid var(--line);animation:fade .3s ease both}
  .frow{display:flex;justify-content:space-between;gap:12px;padding:13px 16px;border-bottom:1.5px solid var(--line);background:var(--card);font-family:var(--mono);font-size:13px}
  .frow:last-child{border-bottom:0}
  .frow .fn{overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
  .frow .fm{color:var(--faint);flex:0 0 auto}
  .kindnote{font-family:var(--mono);font-size:11px;color:var(--faint);margin-bottom:12px;letter-spacing:.5px}

  .empty,.note{padding:30px 18px;text-align:center;font-family:var(--mono);font-size:13px;color:var(--faint);border:1.5px dashed var(--line-soft);line-height:1.6}
  .note.err{color:var(--accent);border-color:var(--accent)}
  .loading{display:flex;align-items:center;gap:11px;font-family:var(--mono);font-size:13px;color:var(--muted);padding:28px 2px}
  .spin{width:14px;height:14px;border:2px solid var(--line);border-top-color:var(--accent);animation:spin .7s linear infinite}

  .center{display:flex;flex-direction:column;justify-content:center;min-height:100dvh;padding:26px 22px;max-width:var(--maxw);margin:0 auto}
  .setup .brand{font-size:40px;margin-bottom:4px}
  .setup .lead{font-family:var(--mono);font-size:12.5px;color:var(--muted);margin:14px 0 26px;line-height:1.6;letter-spacing:.3px}
  .field{margin-bottom:16px}
  .field label{display:block;font-family:var(--mono);font-size:11px;letter-spacing:1px;text-transform:uppercase;color:var(--faint);margin-bottom:7px}
  .field input{width:100%;background:var(--card);border:1.5px solid var(--line);color:var(--ink);padding:13px 14px;font-family:var(--mono);font-size:13.5px;transition:.15s}
  .field input:focus{outline:none;border-color:var(--accent)}
  .hint{font-family:var(--mono);font-size:11px;color:var(--faint);margin-top:6px;line-height:1.5}
  .btn{width:100%;margin-top:10px;background:var(--accent);color:var(--on-accent);border:1.5px solid var(--accent);padding:15px;font-family:var(--mono);font-weight:700;font-size:14px;letter-spacing:1.5px;text-transform:uppercase;cursor:pointer;transition:.15s}
  .btn:hover{filter:brightness(1.05)}
  .btn:disabled{opacity:.55;cursor:default}
  .formerr{font-family:var(--mono);font-size:12px;color:var(--accent);margin-top:14px;min-height:1px;line-height:1.5}

  @keyframes spin{to{transform:rotate(360deg)}}

  .subtabs{display:flex;gap:18px;overflow-x:auto;margin-bottom:18px;scrollbar-width:none;border-bottom:1.5px solid var(--line-soft)}
  .subtabs::-webkit-scrollbar{display:none}
  .subtab{flex:0 0 auto;background:none;border:none;border-bottom:2px solid transparent;color:var(--faint);font-family:var(--mono);font-size:12px;letter-spacing:1px;text-transform:uppercase;padding:0 0 10px;cursor:pointer;transition:.15s;margin-bottom:-1.5px}
  .subtab:hover{color:var(--ink)}
  .subtab.active{color:var(--accent);border-bottom-color:var(--accent)}

  .doc{font-family:var(--mono);font-size:13px;line-height:1.65;color:var(--ink);animation:fade .3s ease both;overflow-wrap:break-word}
  .doc h1{font-family:var(--grotesk);font-weight:800;font-size:25px;letter-spacing:-.5px;margin:0 0 12px;line-height:1.1}
  .doc h2{font-family:var(--grotesk);font-weight:800;font-size:20px;letter-spacing:-.3px;margin:26px 0 10px;padding-top:18px;border-top:1.5px solid var(--line)}
  .doc h3{font-family:var(--grotesk);font-weight:700;font-size:16px;margin:20px 0 8px}
  .doc p{margin:0 0 12px}
  .doc ul,.doc ol{margin:0 0 12px 20px}
  .doc li{margin:3px 0}
  .doc a{color:var(--accent);text-decoration:none}
  .doc a:hover{text-decoration:underline}
  .doc strong{font-weight:700;color:var(--ink)}
  .doc em{font-style:italic}
  .doc code{font-family:var(--mono);background:var(--card);border:1px solid var(--line-soft);padding:1px 5px;font-size:12px}
  .doc pre{background:var(--card);border:1.5px solid var(--line);padding:12px;overflow-x:auto;margin:0 0 14px}
  .doc pre code{border:none;background:none;padding:0}
  .doc blockquote{border-left:3px solid var(--accent);margin:0 0 14px;padding:4px 0 4px 14px;color:var(--muted)}
  .doc hr{border:0;border-top:1.5px solid var(--line);margin:22px 0}
  .doc table{border-collapse:collapse;width:100%;margin:0 0 16px;font-size:12px;display:block;overflow-x:auto}
  .doc th,.doc td{border:1.5px solid var(--line);padding:8px 10px;text-align:left;vertical-align:top}
  .doc th{background:var(--card);font-weight:700}
  .doc img{max-width:100%}

  .modal-ov{position:fixed;inset:0;background:rgba(0,0,0,.55);display:flex;align-items:center;justify-content:center;padding:24px;z-index:1000;animation:fade .15s ease both}
  .modal{background:var(--bg);border:1.5px solid var(--line);max-width:380px;width:100%;padding:22px;animation:rise .2s ease both}
  .modal-msg{font-family:var(--mono);font-size:14px;color:var(--ink);line-height:1.5;margin-bottom:18px}
  .modal-btns{display:flex;gap:8px}
  .modal-btns .btn{margin-top:0;flex:1}

  .compose{margin-bottom:20px}
  .compose textarea{width:100%;min-height:84px;resize:vertical;background:var(--card);border:1.5px solid var(--line);color:var(--ink);padding:12px 14px;font-family:var(--mono);font-size:13px;line-height:1.55;transition:.15s;-webkit-appearance:none}
  .compose textarea:focus{outline:none;border-color:var(--accent)}
  .compose textarea::placeholder{color:var(--faint)}
  .compose .formbtns{margin-top:8px}
  .ncard{border:1.5px solid var(--line);background:var(--card);padding:14px 16px;margin-bottom:10px;animation:fade .25s ease both}
  .ncard-top{display:flex;justify-content:space-between;align-items:center;margin-bottom:8px}
  .ndate{font-family:var(--mono);font-size:11px;color:var(--faint);letter-spacing:.5px}
  .ntext{font-family:var(--mono);font-size:13px;line-height:1.55;white-space:pre-wrap;word-break:break-word;color:var(--ink)}


  /* doclist (Notes) */
  .frow-btn{appearance:none;-webkit-appearance:none;width:100%;text-align:left;font:inherit;color:inherit}
  .backbtn{margin-bottom:14px}
  /* roadmap */
  .rm-dash{margin-bottom:22px}
  .rm-overall{display:flex;align-items:baseline;justify-content:space-between;margin-bottom:10px}
  .rm-pct{font-family:var(--grotesk);font-weight:800;font-size:34px;letter-spacing:-1px}
  .rm-sub{font-family:var(--mono);font-size:12px;color:var(--faint)}
  .rm-phase{border:1.5px solid var(--line);margin-bottom:10px;animation:fade .25s ease both}
  .rm-phead{display:flex;align-items:center;gap:12px;padding:13px 15px;cursor:pointer;background:var(--card)}
  .rm-phead .pn{flex:1;font-family:var(--grotesk);font-weight:700;font-size:15px;line-height:1.2}
  .rm-phead .pc{font-family:var(--mono);font-size:11px;color:var(--faint);flex:0 0 auto}
  .rm-chev{font-family:var(--mono);color:var(--faint);flex:0 0 auto;width:14px;text-align:center}
  .rm-phase.open .rm-chev{color:var(--accent)}
  .segbar.rm-pbar{gap:2px;padding:0 15px 12px;margin:0;background:var(--card)}
  .segbar.rm-pbar .seg{height:6px}
  .rm-body{padding:4px 15px 14px;background:var(--card);border-top:1.5px solid var(--line-soft)}
  .rm-ms{margin:14px 0 4px;font-family:var(--mono);font-size:11px;letter-spacing:.5px;color:var(--faint);text-transform:uppercase}
  .rm-s{display:flex;align-items:flex-start;gap:11px;padding:9px 0;border-top:1px solid var(--line-soft)}
  .rm-cb{flex:0 0 auto;width:20px;height:20px;border:1.5px solid var(--line);display:flex;align-items:center;justify-content:center;font-family:var(--mono);font-size:12px;cursor:pointer;color:var(--on-accent);background:transparent;margin-top:1px;padding:0}
  .rm-cb.done{background:var(--accent);border-color:var(--accent)}
  .rm-smain{flex:1;cursor:pointer;min-width:0}
  .rm-stitle{font-size:14px;line-height:1.35}
  .rm-smeta{font-family:var(--mono);font-size:10.5px;color:var(--faint);margin-top:3px;word-break:break-word}
  .rm-size{font-weight:700;color:var(--accent)}
  .rm-sdesc{font-family:var(--mono);font-size:12px;color:var(--muted);line-height:1.55;margin-top:8px}

  @keyframes rise{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:none}}
  @keyframes fade{from{opacity:0}to{opacity:1}}
  /* кнопка «наверх» — появляется при скролле, поверх всего, снизу по центру */
  .totop{position:fixed;left:50%;bottom:calc(env(safe-area-inset-bottom) + 20px);
    transform:translateX(-50%) translateY(16px);z-index:1000;
    display:flex;align-items:center;gap:7px;
    font-family:var(--mono);font-size:11px;letter-spacing:1px;text-transform:uppercase;
    background:var(--tab-bg);color:var(--ink);border:1.5px solid var(--line);
    padding:10px 16px;cursor:pointer;
    opacity:0;pointer-events:none;transition:opacity .22s ease,transform .22s ease,background .15s,color .15s}
  .totop .ar{font-size:14px;line-height:1}
  .totop.show{opacity:1;pointer-events:auto;transform:translateX(-50%) translateY(0)}
  .totop:hover{background:var(--ink);color:var(--bg)}

  /* pull-to-refresh (мобильный жест) */
  .ptr{position:fixed;top:0;left:50%;transform:translateX(-50%) translateY(-100%);z-index:1100;
    width:36px;height:36px;display:flex;align-items:center;justify-content:center;
    background:var(--card);border:1.5px solid var(--line);border-radius:50%;box-shadow:0 3px 12px rgba(0,0,0,.28)}
  .ptr-i{width:18px;height:18px;border:2px solid var(--line);border-top-color:var(--accent);border-radius:50%}
  .ptr.ready{border-color:var(--accent)}
  .ptr.ready .ptr-i{border-color:var(--accent)}
  .ptr.spin-on .ptr-i{animation:ptrspin .7s linear infinite}
  @keyframes ptrspin{to{transform:rotate(360deg)}}

  /* ——— Tasks ——— */
  .tk-create{width:100%;margin:0 0 16px}
  .tk-filters{display:flex;gap:8px;flex-wrap:wrap;align-items:center;margin-bottom:18px}
  .tk-filters select{flex:0 1 auto;font-family:var(--mono);font-size:12px;background:var(--card);color:var(--ink);border:1.5px solid var(--line);padding:9px 10px;cursor:pointer}
  .btn.tk-mini{width:auto;margin-top:0;padding:9px 12px;font-size:12px;letter-spacing:.5px}
  .tk-more{width:100%;margin-top:8px}
  .tk-card{border:1.5px solid var(--line);background:var(--card);padding:14px 15px;margin-bottom:12px;cursor:pointer;transition:.15s}
  .tk-card:hover{border-color:var(--accent)}
  .tk-card-top{display:flex;align-items:center;gap:8px;margin-bottom:8px;flex-wrap:wrap}
  .tk-id{font-family:var(--mono);font-size:11px;color:var(--accent);letter-spacing:.5px}
  .tk-badge{font-family:var(--mono);font-size:10px;letter-spacing:1px;text-transform:uppercase;border:1.5px solid var(--line);color:var(--muted);padding:2px 7px}
  .tk-badge.st-in_progress{color:var(--accent);border-color:var(--accent)}
  .tk-card-title{font-family:var(--grotesk);font-size:16px;font-weight:600;margin-bottom:8px;word-break:break-word}
  .tk-meta{font-family:var(--mono);font-size:11px;color:var(--faint)}
  .tk-prog{font-family:var(--mono);font-size:11px;color:var(--muted);margin-bottom:4px}
  .tk-bar{display:flex;gap:3px;margin:0 0 10px}
  .tk-bar span{flex:1;height:5px;background:var(--line)}
  .tk-bar span.on{background:var(--accent)}
  .tk-back{font-family:var(--mono);font-size:12px;color:var(--muted);background:none;border:0;cursor:pointer;padding:0;margin-bottom:14px;letter-spacing:.5px}
  .tk-back:hover{color:var(--ink)}
  .tk-dhead{display:flex;align-items:center;gap:8px;margin-bottom:10px;flex-wrap:wrap}
  .tk-save{font-family:var(--mono);font-size:10px;color:var(--faint);margin-left:auto;white-space:nowrap}
  .tk-title{width:100%;font-family:var(--grotesk);font-size:19px;font-weight:700;background:transparent;border:0;border-bottom:1.5px solid var(--line);padding:6px 0;color:var(--ink)}
  .tk-title:focus{outline:none;border-bottom-color:var(--accent)}
  .tk-dmeta{font-family:var(--mono);font-size:11px;color:var(--faint);margin:8px 0 18px}
  .tk-sec{font-family:var(--mono);font-size:11px;letter-spacing:1px;text-transform:uppercase;color:var(--faint);margin:18px 0 9px}
  .tk-seg{display:flex;max-width:340px;margin-bottom:6px}
  .tk-seg button{flex:1;font-family:var(--mono);font-size:12px;letter-spacing:.5px;padding:10px;background:var(--card);color:var(--muted);border:1.5px solid var(--line);border-left-width:0;cursor:pointer;transition:.12s}
  .tk-seg button:first-child{border-left-width:1.5px}
  .tk-seg button.on{background:var(--accent);color:var(--on-accent);border-color:var(--accent);font-weight:700}
  .tk-desc{width:100%;min-height:90px;resize:vertical;background:var(--card);border:1.5px solid var(--line);color:var(--ink);padding:12px 14px;font-family:var(--mono);font-size:13px;line-height:1.55}
  .tk-desc:focus{outline:none;border-color:var(--accent)}
  .tk-item{border:1.5px solid var(--line-soft);background:var(--card);padding:8px 10px;margin-bottom:8px}
  .tk-irow{display:flex;align-items:center;gap:9px}
  .tk-cbox{flex:0 0 auto;width:20px;height:20px;border:1.5px solid var(--line);background:transparent;cursor:pointer;display:flex;align-items:center;justify-content:center;font-family:var(--mono);font-size:12px;color:var(--on-accent)}
  .tk-cbox.on{background:var(--accent);border-color:var(--accent)}
  .tk-itext{flex:1 1 auto;background:transparent;border:0;color:var(--ink);font-family:var(--grotesk);font-size:14px;padding:4px 2px}
  .tk-itext:focus{outline:1px solid var(--line)}
  .tk-item.done .tk-itext{color:var(--faint);text-decoration:line-through}
  .tk-ord{display:flex;flex-direction:column;gap:2px}
  .tk-ib{font-family:var(--mono);background:transparent;border:1.5px solid var(--line);color:var(--muted);cursor:pointer;width:28px;height:18px;line-height:1;font-size:11px;padding:0;transition:.12s}
  .tk-ib:hover{background:var(--ink);color:var(--bg)}
  .tk-ib:disabled{opacity:.3;cursor:default}
  .tk-ib.tk-x{height:34px;width:32px;font-size:13px;flex:0 0 auto}
  .tk-inote{width:100%;margin-top:7px;font-family:var(--mono);font-size:12px;background:var(--bg);border:1px solid var(--line-soft);color:var(--muted);padding:6px 8px;min-height:34px;resize:vertical}
  .tk-sfiles{font-family:var(--mono);font-size:10px;letter-spacing:.5px;color:var(--faint);margin-top:9px;text-transform:uppercase}
  .tk-addrow{display:flex;gap:8px;margin:12px 0 6px}
  .tk-addrow input{flex:1;background:var(--card);border:1.5px solid var(--line);color:var(--ink);padding:10px 12px;font-family:var(--grotesk);font-size:14px}
  .tk-addrow input:focus{outline:none;border-color:var(--accent)}
  .tk-att{margin-top:4px}
  .tk-atts{display:flex;flex-direction:column;gap:6px;margin-top:8px}
  .tk-chip{display:flex;align-items:center;gap:9px;border:1.5px solid var(--line-soft);background:var(--card);padding:6px 8px;font-family:var(--mono);font-size:12px;color:var(--muted)}
  .tk-chip img{width:34px;height:34px;object-fit:cover;border:1px solid var(--line);flex:0 0 auto;background:var(--bg)}
  .tk-chip .fn{flex:1 1 auto;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;color:var(--accent);cursor:pointer}
  .tk-actions{display:flex;gap:10px;flex-wrap:wrap;border-top:1.5px solid var(--line);padding-top:16px;margin-top:22px}
  .tk-actions .btn{width:auto;margin-top:0}
  .btn.tk-danger:hover{background:#e07a7a;border-color:#e07a7a;color:#15101e}
  .tk-modal{max-width:560px}
  .tk-src{margin-top:18px}
  .tk-src summary{font-family:var(--mono);font-size:11px;color:var(--faint);cursor:pointer;letter-spacing:.5px}
  .tk-src pre{font-family:var(--mono);font-size:12px;background:var(--card);border:1.5px solid var(--line);padding:12px;margin-top:8px;white-space:pre-wrap;color:var(--muted);overflow-x:auto}
</style>
</head>
<body>
<div id="root"></div>
<button id="toTop" class="totop" aria-label="Наверх"><span class="ar">↑</span>top</button>
<div id="ptr" class="ptr" aria-hidden="true"><div class="ptr-i"></div></div>
<script>
"use strict";

const CONFIG_PATH = "GrowthApp/config.md";
const STORE_KEY = "growth.connection.v1";
const THEME_KEY = "growth.theme";
const PROPFIND_BODY =
  '<?xml version="1.0"?><d:propfind xmlns:d="DAV:"><d:prop>' +
  '<d:getlastmodified/><d:getcontentlength/><d:resourcetype/></d:prop></d:propfind>';

let conn = null;
const mem = {};
let modules = [];
let activeId = null;
let activeArtifact = null;

// ——— тема ———
function loadTheme(){
  let t; try{ t = localStorage.getItem(THEME_KEY); }catch(e){}
  if(!t) t = (window.matchMedia && matchMedia("(prefers-color-scheme: dark)").matches) ? "dark" : "light";
  return t;
}
function applyTheme(t){
  document.documentElement.setAttribute("data-theme", t);
  document.querySelector('meta[name=theme-color]').setAttribute("content", t==="dark" ? "#0c0a11" : "#e7e3d8");
  try{ localStorage.setItem(THEME_KEY, t); }catch(e){}
}
function curTheme(){ return document.documentElement.getAttribute("data-theme"); }
function toggleTheme(){
  applyTheme(curTheme()==="dark" ? "light" : "dark");
  const b = document.getElementById("themeBtn"); if(b) b.textContent = curTheme()==="dark" ? "LIGHT" : "DARK";
}
applyTheme(loadTheme());

// ——— подключение ———
function loadConn(){ try{ const r=localStorage.getItem(STORE_KEY); if(r) return JSON.parse(r);}catch(e){} return mem[STORE_KEY]||null; }
function saveConn(c){ mem[STORE_KEY]=c; try{ localStorage.setItem(STORE_KEY, JSON.stringify(c)); }catch(e){} }

// ——— WebDAV через воркер ———
function encodePath(p){ const tr=p.endsWith("/"); const e="/"+p.split("/").filter(Boolean).map(encodeURIComponent).join("/"); return tr?e+"/":e; }
function authHeader(){ return "Basic " + btoa(conn.login + ":" + conn.password); }
async function dav(method, path, opts){
  opts = opts || {};
  const base = conn.workerUrl.replace(/\/+$/, "");
  const headers = { "Authorization": authHeader(), "X-Proxy-Secret": conn.secret };
  if(opts.depth != null) headers["Depth"] = String(opts.depth);
  if(opts.body != null) headers["Content-Type"] = opts.contentType || "application/xml";
  return fetch(base + encodePath(path), { method, headers, body: opts.body });
}
async function getText(path){ const r=await dav("GET",path); if(!r.ok) throw new Error("HTTP "+r.status); return r.text(); }
async function putText(path, text){ const r=await dav("PUT", path, {body:text, contentType:"text/markdown; charset=utf-8"}); if(!r.ok) throw new Error("HTTP "+r.status); }
function norm(p){ return "/" + p.split("/").filter(Boolean).join("/"); }
async function listDir(path){
  const dir = path.endsWith("/")?path:path+"/";
  const res = await dav("PROPFIND", dir, { body: PROPFIND_BODY, depth: 1 });
  if(!res.ok) throw new Error("HTTP " + res.status);
  const xml = new DOMParser().parseFromString(await res.text(), "application/xml");
  const ns="DAV:", reqNorm=norm(path), out=[];
  for(const r of xml.getElementsByTagNameNS(ns,"response")){
    const hEl=r.getElementsByTagNameNS(ns,"href")[0];
    const href=decodeURIComponent(hEl?hEl.textContent:"");
    if(norm(href)===reqNorm) continue;
    const isDir=!!r.getElementsByTagNameNS(ns,"collection")[0];
    const sEl=r.getElementsByTagNameNS(ns,"getcontentlength")[0];
    out.push({ path:norm(href), name:norm(href).split("/").pop(), isDir, size:sEl?+sEl.textContent:null });
  }
  out.sort((a,b)=> (a.isDir!==b.isDir)?(a.isDir?-1:1):a.name.localeCompare(b.name,'ru'));
  return out;
}
async function ensureDir(path){               // MKCOL по цепочке (существующие — игнор)
  const parts = path.split("/").filter(Boolean);
  let acc = "";
  for(const p of parts){ acc += "/" + p; try{ await dav("MKCOL", acc + "/"); }catch(e){} }
}
async function putBytes(path, blob, contentType){
  const r = await dav("PUT", path, { body:blob, contentType:contentType||"application/octet-stream" });
  if(!r.ok) throw new Error("HTTP " + r.status);
}
async function davDelete(path){
  const r = await dav("DELETE", path);
  if(!r.ok && r.status!==404) throw new Error("HTTP " + r.status);
}

// ——— конфиг / frontmatter ———
function parseFrontmatter(md){ const m=md.match(/^---\s*\n([\s\S]*?)\n---/); return m?(jsyaml.load(m[1])||{}):null; }
function bodyOf(md){ const m=md.match(/^---\s*\n[\s\S]*?\n---\s*\n?([\s\S]*)$/); return m?m[1]:md; }
async function loadConfig(){
  const data = parseFrontmatter(await getText(CONFIG_PATH));
  if(!data) throw new Error("нет frontmatter в config.md");
  return (Array.isArray(data.modules)?data.modules:[]).filter(m=>m&&m.enabled!==false).sort((a,b)=>(a.order||0)-(b.order||0));
}

// ——— утилиты ———
function esc(s){ return String(s).replace(/[&<>"]/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;"}[c])); }
function el(h){ const t=document.createElement("template"); t.innerHTML=h.trim(); return t.content.firstChild; }
function fmtSize(n){ if(n==null)return""; if(n<1024)return n+" B"; if(n<1048576)return (n/1024).toFixed(1)+" KB"; return (n/1048576).toFixed(1)+" MB"; }
function setCount(v){ const c=document.getElementById("secCount"); if(c) c.textContent=v||""; }
function showConfirm(msg, okText){
  return new Promise(res=>{
    const ov = el(`<div class="modal-ov"><div class="modal">
      <div class="modal-msg">${esc(msg)}</div>
      <div class="modal-btns">
        <button class="btn ghost" id="mc_no">Отмена</button>
        <button class="btn" id="mc_yes">${esc(okText||"Удалить")}</button>
      </div></div></div>`);
    document.body.appendChild(ov);
    const done = v => { ov.remove(); document.removeEventListener("keydown", onKey); res(v); };
    function onKey(e){ if(e.key==="Escape") done(false); if(e.key==="Enter") done(true); }
    document.addEventListener("keydown", onKey);
    ov.querySelector("#mc_yes").onclick = ()=>done(true);
    ov.querySelector("#mc_no").onclick = ()=>done(false);
    ov.onclick = e => { if(e.target===ov) done(false); };
    ov.querySelector("#mc_yes").focus();
  });
}

// ——— рендереры по kind ———
function parseVocabTable(md){
  const lines = md.split(/\r?\n/).map(l=>l.trim()).filter(l=>l.startsWith("|"));
  if(lines.length<2) return [];
  const cells = l => l.replace(/^\|/,"").replace(/\|$/,"").split("|").map(c=>c.trim().replace(/\\\|/g,"|"));
  const header = cells(lines[0]).map(h=>h.toLowerCase());
  const ix = n => header.indexOf(n);
  const iW=ix("word"), iT=ix("translation"), iM=ix("mastered"), iE=ix("example"), iN=ix("note");
  const out=[];
  for(let i=1;i<lines.length;i++){
    if(/^[|\s:\-]+$/.test(lines[i])) continue;            // строка-разделитель
    const c = cells(lines[i]);
    const en = (iW>=0?c[iW]:c[0]) || "";
    if(!en) continue;
    const mv = (iM>=0?(c[iM]||""):"").toLowerCase();
    out.push({ en, ru:iT>=0?(c[iT]||""):"", mastered:/^(yes|x|true|1|✓)$/.test(mv),
      example:iE>=0?(c[iE]||""):"", note:iN>=0?(c[iN]||""):"" });
  }
  return out;
}

function serializeVocab(words){
  const c = s => (s||"").replace(/\r?\n/g," ").replace(/\|/g,"\\|").trim();
  let out = "| Word | Translation | Mastered | Example | Note |\n|---|---|---|---|---|\n";
  for(const w of words) out += `| ${c(w.en)} | ${c(w.ru)} | ${w.mastered?"yes":"no"} | ${c(w.example)} | ${c(w.note)} |\n`;
  return out;
}

async function renderVocabulary(filePath, host){
  let md;
  try{ md = await getText(filePath); }
  catch(e){
    const code=(String(e.message).match(/HTTP (\d+)/)||[])[1];
    if(code==="404"){ md = ""; }   // файла нет — начнём с пустого словаря, создадим при первом добавлении
    else { host.innerHTML = `<div class="note err">Ошибка: ${esc(e.message)}</div>`; return; }
  }
  const words = parseVocabTable(bodyOf(md));   // порядок файла сохраняем
  let saving = false, query = "";

  host.innerHTML = `
    <div class="vtoolbar">
      <input id="vSearch" class="search" type="search" placeholder="поиск слова или перевода…" autocomplete="off">
      <button class="addbtn" id="vAdd" title="Добавить слово">+</button>
    </div>
    <div id="vForm"></div>
    <div id="vCards"></div>`;
  const box = host.querySelector("#vCards");
  const formHost = host.querySelector("#vForm");

  function refreshCount(){ setCount(words.filter(w=>!w.mastered).length + " to master"); }

  async function save(){
    saving = true;
    try{ await putText(filePath, serializeVocab(words)); }
    catch(e){ alert("Не удалось сохранить: " + e.message); throw e; }
    finally{ saving = false; }
  }

  async function onDelete(w){
    if(saving) return;
    if(!(await showConfirm(`Удалить «${w.en}» из словаря?`))) return;
    const i = words.indexOf(w);
    if(i<0) return;
    words.splice(i,1);
    try{ await save(); refreshCount(); draw(); }
    catch(e){ words.splice(i,0,w); draw(); }   // откат при ошибке записи
  }

  function draw(){
    const q = query.trim().toLowerCase();
    const view = q ? words.filter(w => (w.en+" "+w.ru+" "+w.note+" "+w.example).toLowerCase().includes(q)) : words.slice();
    view.sort((a,b)=> (a.mastered!==b.mastered)?(a.mastered?1:-1):a.en.localeCompare(b.en,'en'));
    box.innerHTML = "";
    if(!view.length){ box.innerHTML = `<div class="empty">${words.length? "Ничего не найдено." : "Словарь пуст — добавь первое слово кнопкой +"}</div>`; return; }
    const wrap = document.createElement("div"); wrap.className = "cards";
    for(const w of view){
      const card = el(`<div class="card">
        <div class="card-top">
          <span class="word">${esc(w.en)}</span>
          <span class="card-right">
            <span class="tag ${w.mastered?"mastered":"learning"}">[${w.mastered?"MASTERED":"LEARNING"}]</span>
            <button class="del" title="Удалить">×</button>
          </span>
        </div>
        ${w.ru?`<div class="tr">${esc(w.ru)}</div>`:""}
        ${w.example?`<div class="ex"><span class="gt">&gt;</span>${esc(w.example)}</div>`:""}
        ${w.note?`<div class="note-line">${esc(w.note)}</div>`:""}
      </div>`);
      card.querySelector(".del").onclick = ()=>onDelete(w);
      wrap.appendChild(card);
    }
    box.appendChild(wrap);
  }

  function openForm(){
    formHost.innerHTML = `
      <div class="addform">
        <div class="grow">
          <div class="field"><label>Слово / фраза</label><input id="a_en" autocomplete="off"></div>
          <div class="field"><label>Перевод</label><input id="a_ru" autocomplete="off"></div>
        </div>
        <div class="field"><label>Пример (необязательно)</label><input id="a_ex" autocomplete="off"></div>
        <div class="field"><label>Заметка (необязательно)</label><input id="a_note" autocomplete="off"></div>
        <label class="chk"><input type="checkbox" id="a_m"> уже выучено</label>
        <div class="formbtns">
          <button class="btn" id="a_save">Добавить</button>
          <button class="btn ghost" id="a_cancel">Отмена</button>
        </div>
      </div>`;
    const enInp = formHost.querySelector("#a_en"); enInp.focus();
    formHost.querySelector("#a_cancel").onclick = ()=>{ formHost.innerHTML=""; };
    formHost.querySelector("#a_save").onclick = async ()=>{
      const en = enInp.value.trim(), ru = formHost.querySelector("#a_ru").value.trim();
      if(!en){ enInp.focus(); return; }
      if(words.some(w=>w.en.toLowerCase()===en.toLowerCase())){ alert("Такое слово уже есть в словаре."); return; }
      const w = { en, ru, mastered: formHost.querySelector("#a_m").checked,
        example: formHost.querySelector("#a_ex").value.trim(), note: formHost.querySelector("#a_note").value.trim() };
      const btn = formHost.querySelector("#a_save"); btn.disabled = true; btn.textContent = "Сохраняю…";
      words.push(w);
      try{ await save(); formHost.innerHTML=""; query=""; host.querySelector("#vSearch").value=""; refreshCount(); draw(); }
      catch(e){ words.pop(); btn.disabled=false; btn.textContent="Добавить"; }
    };
  }

  host.querySelector("#vSearch").addEventListener("input", e=>{ query = e.target.value; draw(); });
  host.querySelector("#vAdd").onclick = openForm;
  refreshCount();
  draw();
}

async function renderChecklist(m, host){
  const files = (await listDir(m.path)).filter(x=>!x.isDir && x.name.toLowerCase().endsWith(".md"));
  if(!files.length){ host.innerHTML=`<div class="empty">Чеклист пуст.<br>Добавь <b>.md</b>-файл со строками <b>- [ ]</b> / <b>- [x]</b>.</div>`; return; }
  const file = files.find(x=>x.name.toLowerCase()===m.id+".md") || files[0];
  const md = bodyOf(await getText(file.path));
  const lines = [...md.matchAll(/^\s*[-*]\s*\[([ xX])\]\s+(.*)$/gm)].map(mm=>({done:/x/i.test(mm[1]), text:mm[2].trim()}));
  if(!lines.length){ host.innerHTML=`<div class="empty">В файле нет пунктов <b>- [ ]</b> / <b>- [x]</b>.</div>`; return; }
  const done=lines.filter(l=>l.done).length, total=lines.length, pct=Math.round(done/total*100);
  setCount(done+" / "+total);
  const SEG=24, on=Math.round(pct/100*SEG);
  let bar=`<div class="segbar">`; for(let i=0;i<SEG;i++) bar+=`<div class="seg ${i<on?"on":""}"></div>`; bar+=`</div>`;
  let list=`<div class="checklist">`;
  for(const l of lines) list+=`<div class="citem ${l.done?"done":"todo"}"><span class="cbox ${l.done?"done":"todo"}">[${l.done?"x":" "}]</span><span class="ctext">${esc(l.text)}</span></div>`;
  host.innerHTML=`<div class="progress-label">Learning path · <b>${pct}%</b></div>${bar}${list}</div>`;
}

async function renderFallback(m, host){
  const items = await listDir(m.path);
  setCount(items.filter(x=>!x.isDir).length+" files");
  let h=`<div class="kindnote">// рендерер для kind «${esc(m.kind||"—")}» появится на этапе трекеров — пока файлы</div>`;
  if(!items.length) h+=`<div class="empty">Папка пуста.</div>`;
  else{ h+=`<div class="filelist">`;
    for(const it of items) h+=`<div class="frow"><span class="fn">${it.isDir?"▸ ":""}${esc(it.name)}</span><span class="fm">${it.isDir?"dir":fmtSize(it.size)}</span></div>`;
    h+=`</div>`; }
  host.innerHTML=h;
}

// ——— Tasks ———
const TK_TYPES = ["simple","checklist","steps"];
const TK_TYPE_LABEL = { simple:"простая", checklist:"чеклист", steps:"шаги" };
const TK_STATUS_LABEL = { todo:"to do", in_progress:"in progress", done:"done" };
const TK_PAGE = 10;
const TK_IMG_EXT = ["png","jpg","jpeg","gif","webp","svg","bmp","heic","heif"];

function tkStamp(){ const d=new Date(), p=x=>String(x).padStart(2,"0");
  return `${d.getFullYear()}-${p(d.getMonth()+1)}-${p(d.getDate())}T${p(d.getHours())}:${p(d.getMinutes())}:${p(d.getSeconds())}`; }
function tkFmt(ts){ return ts?String(ts).replace("T"," ").slice(0,16):"—"; }
function tkGuessType(fn){ const e=(String(fn).split(".").pop()||"").toLowerCase(); return TK_IMG_EXT.indexOf(e)>=0?"image/"+e:""; }
function tkIsImg(a){ return !!a && (((a.type||"").indexOf("image/")===0) || tkGuessType(a.name).indexOf("image/")===0); }
function tkStatusOf(t){ const h=t.history; return (h&&h.length)?h[h.length-1].status:(t.status||"todo"); }
function tkChangedAt(t){ const h=t.history; return (h&&h.length)?h[h.length-1].at:t.opened_at; }
function tkIsClosed(t){ return !!t.closed_at; }
function tkProgress(t){ const it=t.items||[]; if(!it.length) return null; const d=it.filter(i=>i.done).length; return {done:d,total:it.length,pct:Math.round(d/it.length*100)}; }
function tkAttPath(t,name){ return "../Documents/"+t.name+"/"+String(name).replace(/ /g,"%20"); }
function tkAttLine(a,t){ return (tkIsImg(a)?"- !":"- ")+"["+a.name+"]("+tkAttPath(t,a.name)+")"; }
function tkSetStatus(t,s){ if(tkStatusOf(t)===s) return; const at=tkStamp(); if(!Array.isArray(t.history)) t.history=[]; t.history.push({status:s,at}); t.status=s; t.closed_at = (s==="done")?at:""; }
// описание для любого типа: у simple — тело, у списочных — intro (текст до списка)
function tkGetDesc(t){ return t.type==="simple" ? (t.description||"") : (t.intro||""); }
function tkSetDesc(t,v){ if(t.type==="simple") t.description=v; else t.intro=v; }

function tkParseAtts(text){ const out=[], re=/^\s*-\s*!?\[[^\]]*\]\(([^)]+)\)\s*$/gm; let m;
  while((m=re.exec(text))){ const fn=decodeURIComponent(m[1].split("/").pop().replace(/%20/g," ")); out.push({name:fn,type:tkGuessType(fn)}); } return out; }

function tkParse(fileName, md){
  const fm = parseFrontmatter(md) || {};
  const body = bodyOf(md);
  const idm = fileName.match(/(\d+)/);
  const t = { fileName, name:fileName.replace(/\.md$/i,""), id:idm?+idm[1]:0, fm,
    title: fm.title || fileName.replace(/\.md$/i,""),
    type: TK_TYPES.indexOf(fm.type)>=0 ? fm.type : "checklist",
    status: fm.status || "todo", opened_at: fm.opened_at || "", closed_at: fm.closed_at || "",
    history: Array.isArray(fm.history) ? fm.history : [],
    description:"", attachments:[], items:[], intro:"", outro:"" };
  if(t.type==="simple"){
    const idx = body.search(/^##\s+Файлы\s*$/m);
    let desc = body, files = "";
    if(idx>=0){ desc = body.slice(0,idx); files = body.slice(idx).replace(/^##\s+Файлы\s*$/m,""); }
    t.description = desc.replace(/^\s+|\s+$/g,"");
    t.attachments = tkParseAtts(files);
  } else {
    const lines = body.split(/\r?\n/); let i=0; const intro=[];
    while(i<lines.length && !/^\s*-\s*\[[ xX]\]/.test(lines[i])){ intro.push(lines[i]); i++; }
    t.intro = intro.join("\n").replace(/^\s+|\s+$/g,"");
    let cur=null;
    for(; i<lines.length; i++){
      const ln=lines[i];
      const mi=ln.match(/^\s*-\s*\[([ xX])\]\s?(.*)$/);
      if(mi){ cur={text:mi[2],done:/x/i.test(mi[1]),note:"",attachments:[]}; t.items.push(cur); continue; }
      if(cur){
        const mn=ln.match(/^\s+>\s?(.*)$/);
        if(mn){ cur.note = cur.note ? cur.note+"\n"+mn[1] : mn[1]; continue; }
        const ma=ln.match(/^\s+-\s*!?\[[^\]]*\]\(([^)]+)\)\s*$/);
        if(ma){ const fn=decodeURIComponent(ma[1].split("/").pop().replace(/%20/g," ")); cur.attachments.push({name:fn,type:tkGuessType(fn)}); continue; }
        if(ln.trim()==="") continue;
        t.outro = (t.outro ? t.outro+"\n" : "") + ln;
      }
    }
  }
  return t;
}

function tkSerialize(t){
  const fm = Object.assign({}, t.fm);          // сохраняем неизвестные ключи (толерантность)
  fm.title=t.title; fm.type=t.type; fm.status=tkStatusOf(t); fm.opened_at=t.opened_at; fm.closed_at=t.closed_at||""; fm.history=t.history;
  let y; try{ y = jsyaml.dump(fm,{lineWidth:-1}).replace(/\n+$/,""); }catch(e){ y="title: "+t.title+"\ntype: "+t.type; }
  let body="";
  if(t.type==="simple"){
    if(t.description && t.description.trim()) body += "\n"+t.description.trim()+"\n";
    if((t.attachments||[]).length) body += "\n## Файлы\n"+t.attachments.map(a=>tkAttLine(a,t)).join("\n")+"\n";
  } else {
    if(t.intro) body += "\n"+t.intro+"\n";
    const itemsMd = (t.items||[]).map(it=>{
      let s = "- ["+(it.done?"x":" ")+"] "+(it.text||"");
      if(t.type==="steps"){
        if(it.note) s += "\n"+it.note.split("\n").map(l=>"  > "+l).join("\n");
        if((it.attachments||[]).length) s += "\n"+it.attachments.map(a=>"  "+tkAttLine(a,t)).join("\n");
      }
      return s;
    }).join("\n");
    body += "\n"+itemsMd+"\n";
    if(t.outro) body += "\n"+t.outro+"\n";
  }
  return "---\n"+y+"\n---\n"+body;
}

async function tkLoadDir(dir){
  let items;
  try{ items=(await listDir(dir)).filter(x=>!x.isDir && /\.md$/i.test(x.name)); }
  catch(e){ if(/HTTP 404/.test(String(e.message))) return []; throw e; }
  const out=[];
  for(const it of items){ try{ const md=await getText(dir+"/"+it.name); const t=tkParse(it.name, md); t._dir=dir; out.push(t); }catch(e){} }
  return out;
}

function tkPickFiles(cb){
  const inp = el(`<input type="file" multiple style="position:fixed;left:-9999px">`);
  document.body.appendChild(inp);
  inp.onchange = ()=>{ const fs = Array.from(inp.files); inp.remove(); cb(fs); };
  inp.click();
}

async function renderTasks(base, host){
  const A = base+"/active", AR = base+"/archived", DOCS = base+"/Documents";
  setCount("");
  host.innerHTML = `<div class="loading"><div class="spin"></div> loading tasks…</div>`;
  let active, archived;
  try{ active = await tkLoadDir(A); archived = await tkLoadDir(AR); }
  catch(e){ const code=(String(e.message).match(/HTTP (\d+)/)||[])[1];
    host.innerHTML = `<div class="note err">${code?"Ошибка загрузки задач (HTTP "+code+")":"Ошибка: "+esc(e.message)}</div>`; return; }

  let view="list", tab="active", sortBy="created", sortDir="desc", statusFilter="all", page=1, detailName=null;
  const saveTimers = {};

  const fileOf = t => (t._dir||A)+"/"+t.fileName;
  const findTask = n => active.concat(archived).find(t=>t.name===n);
  const nextId = ()=>{ let mx=0; active.concat(archived).forEach(t=>{ if(t.id>mx) mx=t.id; }); return mx+1; };
  async function tkSave(t){ await putText(fileOf(t), tkSerialize(t)); }
  function schedule(t, statusEl){ clearTimeout(saveTimers[t.name]); if(statusEl) statusEl.textContent="сохранение…";
    saveTimers[t.name]=setTimeout(async()=>{ try{ await tkSave(t); if(statusEl) statusEl.textContent="сохранено"; }catch(e){ if(statusEl) statusEl.textContent="ошибка сохранения"; } }, 700); }
  async function flush(t){ clearTimeout(saveTimers[t.name]); await tkSave(t); }
  async function tkBlobUrl(t, name){ const r=await dav("GET", DOCS+"/"+t.name+"/"+name); if(!r.ok) throw new Error("HTTP "+r.status); return URL.createObjectURL(await r.blob()); }
  async function openAtt(t, a){ try{ const u=await tkBlobUrl(t,a.name); window.open(u,"_blank"); }catch(e){ alert("Не удалось открыть файл: "+e.message); } }

  function render(){ if(view==="detail"){ const t=findTask(detailName); if(t){ drawDetail(t); return; } } view="list"; drawList(); }

  // ——— список ———
  function drawList(){
    host.innerHTML = "";
    const st = el(`<div class="subtabs"></div>`);
    const sa = el(`<button class="subtab ${tab==="active"?"active":""}">Текущие · ${active.length}</button>`);
    const sr = el(`<button class="subtab ${tab==="archive"?"active":""}">Архив · ${archived.length}</button>`);
    sa.onclick=()=>{ tab="active"; page=1; drawList(); };
    sr.onclick=()=>{ tab="archive"; page=1; drawList(); };
    st.append(sa,sr); host.appendChild(st);

    if(tab==="active"){
      const btn = el(`<button class="btn tk-create">＋ Создать задачу</button>`);
      btn.onclick = openCreate; host.appendChild(btn);

      const f = el(`<div class="tk-filters"></div>`);
      const sortSel = el(`<select><option value="created">сорт: дата создания</option><option value="status_changed">сорт: смена статуса</option><option value="id">сорт: id</option></select>`);
      sortSel.value=sortBy; sortSel.onchange=()=>{ sortBy=sortSel.value; drawList(); };
      const dirBtn = el(`<button class="btn ghost tk-mini">${sortDir==="desc"?"↓":"↑"}</button>`);
      dirBtn.onclick=()=>{ sortDir = sortDir==="desc"?"asc":"desc"; drawList(); };
      const statSel = el(`<select><option value="all">статус: все</option><option value="todo">статус: to do</option><option value="in_progress">статус: in progress</option></select>`);
      statSel.value=statusFilter; statSel.onchange=()=>{ statusFilter=statSel.value; drawList(); };
      f.append(sortSel,dirBtn,statSel); host.appendChild(f);

      let list = active.slice();
      if(statusFilter!=="all") list=list.filter(t=>tkStatusOf(t)===statusFilter);
      const key = t => sortBy==="id" ? t.id : sortBy==="status_changed" ? tkChangedAt(t) : t.opened_at;
      list.sort((a,b)=>{ const ka=key(a), kb=key(b); const c = ka>kb?1:ka<kb?-1:0; return sortDir==="asc"?c:-c; });
      setCount(active.length+" active");
      if(!list.length){ host.appendChild(el(`<div class="empty">${active.length?"Ничего не подходит под фильтр.":"Нет активных задач."}</div>`)); return; }
      list.forEach(t=>host.appendChild(card(t)));
    } else {
      const list = archived.slice().sort((a,b)=>String(b.closed_at).localeCompare(String(a.closed_at)));
      setCount(archived.length+" archived");
      if(!list.length){ host.appendChild(el(`<div class="empty">Архив пуст.</div>`)); return; }
      const shown = list.slice(0, page*TK_PAGE);
      shown.forEach(t=>host.appendChild(card(t)));
      if(list.length>shown.length){ const m=el(`<button class="btn ghost tk-more">Показать ещё (${list.length-shown.length})</button>`); m.onclick=()=>{ page++; drawList(); }; host.appendChild(m); }
    }
  }

  function card(t){
    const c = el(`<div class="tk-card"></div>`);
    const stat = tkStatusOf(t);
    let top = `<span class="tk-id">${esc(t.name)}</span><span class="tk-badge">${esc(TK_TYPE_LABEL[t.type]||t.type)}</span>`;
    if(!tkIsClosed(t)) top += `<span class="tk-badge st-${stat}">${esc(TK_STATUS_LABEL[stat]||stat)}</span>`;
    c.appendChild(el(`<div class="tk-card-top">${top}</div>`));
    c.appendChild(el(`<div class="tk-card-title">${esc(t.title)}</div>`));
    const pr = tkProgress(t);
    if(pr){ const SEG=20, on=Math.round(pr.pct/100*SEG); let b=`<div class="tk-prog">${pr.done} / ${pr.total} · ${pr.pct}%</div><div class="tk-bar">`;
      for(let i=0;i<SEG;i++) b+=`<span class="${i<on?"on":""}"></span>`; b+=`</div>`; c.appendChild(el(b)); }
    const meta = tkIsClosed(t) ? `создана: ${tkFmt(t.opened_at)} · закрыта: ${tkFmt(t.closed_at)}` : `создана: ${tkFmt(t.opened_at)} · статус с: ${tkFmt(tkChangedAt(t))}`;
    c.appendChild(el(`<div class="tk-meta">${esc(meta)}</div>`));
    c.onclick=()=>{ detailName=t.name; view="detail"; render(); };
    return c;
  }

  // ——— деталь ———
  function drawDetail(t){
    host.innerHTML = "";
    const back = el(`<button class="tk-back">← к списку</button>`); back.onclick=()=>{ view="list"; render(); }; host.appendChild(back);
    const stat = tkStatusOf(t);
    let hd = `<span class="tk-id">${esc(t.name)}</span><span class="tk-badge">${esc(TK_TYPE_LABEL[t.type]||t.type)}</span>`;
    if(!tkIsClosed(t)) hd += `<span class="tk-badge st-${stat}">${esc(TK_STATUS_LABEL[stat]||stat)}</span>`;
    hd += `<span class="tk-save" id="tkSave"></span>`;
    host.appendChild(el(`<div class="tk-dhead">${hd}</div>`));
    const saveEl = host.querySelector("#tkSave");

    const title = el(`<input class="tk-title" value="${esc(t.title)}">`);
    title.addEventListener("input", ()=>{ t.title=title.value; schedule(t,saveEl); });
    title.addEventListener("blur", ()=>{ flush(t).then(()=>{ if(saveEl) saveEl.textContent="сохранено"; }).catch(()=>{}); });
    host.appendChild(title);

    const meta = tkIsClosed(t) ? `создана ${tkFmt(t.opened_at)}  ·  закрыта ${tkFmt(t.closed_at)}` : `создана ${tkFmt(t.opened_at)}  ·  статус с ${tkFmt(tkChangedAt(t))}`;
    host.appendChild(el(`<div class="tk-dmeta">${esc(meta)}</div>`));

    if(!tkIsClosed(t)){
      host.appendChild(el(`<div class="tk-sec">Статус</div>`));
      const seg = el(`<div class="tk-seg"></div>`);
      ["todo","in_progress"].forEach(s=>{ const b=el(`<button class="${tkStatusOf(t)===s?"on":""}">${TK_STATUS_LABEL[s]}</button>`);
        b.onclick=async()=>{ tkSetStatus(t,s); try{ await flush(t); }catch(e){ alert("Не удалось сохранить статус: "+e.message); } render(); }; seg.appendChild(b); });
      host.appendChild(seg);
    }

    // Описание — для любого типа
    host.appendChild(el(`<div class="tk-sec">Описание</div>`));
    const d = el(`<textarea class="tk-desc"></textarea>`); d.value = tkGetDesc(t);
    d.addEventListener("input", ()=>{ tkSetDesc(t,d.value); schedule(t,saveEl); });
    d.addEventListener("blur", ()=>{ flush(t).catch(()=>{}); });
    host.appendChild(d);

    if(t.type==="simple"){
      host.appendChild(el(`<div class="tk-sec">Файлы</div>`));
      if(!t.attachments) t.attachments=[];
      host.appendChild(attachEditor(t, t.attachments, saveEl));
    } else {
      drawItems(t, saveEl);
    }

    const act = el(`<div class="tk-actions"></div>`);
    if(!tkIsClosed(t)){
      const close = el(`<button class="btn">Закрыть задачу</button>`);
      close.onclick = async()=>{ const pr=tkProgress(t); if(pr && pr.done<pr.total){ if(!(await showConfirm("Есть незавершённые пункты. Всё равно закрыть?","Закрыть"))) return; } await moveClose(t); };
      act.appendChild(close);
    } else {
      const re = el(`<button class="btn ghost">Вернуть в активные</button>`);
      re.onclick = ()=> moveReopen(t); act.appendChild(re);
    }
    const del = el(`<button class="btn ghost tk-danger">Удалить</button>`);
    del.onclick = async()=>{ if(!(await showConfirm("Удалить задачу безвозвратно? Прикреплённые файлы останутся в Documents.","Удалить"))) return; await removeTask(t); };
    act.appendChild(del);
    host.appendChild(act);

    const hist = (t.history||[]).map(h=>tkFmt(h.at)+"  →  "+(TK_STATUS_LABEL[h.status]||h.status)).join("\n");
    host.appendChild(el(`<details class="tk-src"><summary>история статусов (${(t.history||[]).length})</summary><pre>${esc(hist)}</pre></details>`));
    host.appendChild(el(`<details class="tk-src"><summary>показать .md (${tkIsClosed(t)?"archived":"active"}/${esc(t.fileName)})</summary><pre>${esc(tkSerialize(t))}</pre></details>`));
  }

  function drawItems(t, saveEl){
    host.appendChild(el(`<div class="tk-sec">${t.type==="steps"?"Шаги":"Пункты"}</div>`));
    const box = el(`<div></div>`);
    (t.items||[]).forEach((it,idx)=> box.appendChild(itemRow(t,it,idx,saveEl)));
    host.appendChild(box);
    const add = el(`<div class="tk-addrow"><input placeholder="${t.type==="steps"?"Новый шаг…":"Новый пункт…"}"><button class="btn tk-mini">＋</button></div>`);
    const ai = add.querySelector("input");
    const go = async()=>{ const v=ai.value.trim(); if(!v) return; t.items.push({text:v,done:false,note:"",attachments:[]}); ai.value=""; try{ await flush(t); }catch(e){} render(); };
    add.querySelector("button").onclick=go; ai.addEventListener("keydown", e=>{ if(e.key==="Enter") go(); });
    host.appendChild(add);
  }

  function itemRow(t, it, idx, saveEl){
    const isSteps = t.type==="steps";
    const row = el(`<div class="tk-item ${it.done?"done":""}"></div>`);
    const r = el(`<div class="tk-irow"></div>`);
    const cb = el(`<button class="tk-cbox ${it.done?"on":""}">${it.done?"✓":""}</button>`);
    cb.onclick = async()=>{ it.done=!it.done; try{ await flush(t); }catch(e){} render(); };
    r.appendChild(cb);
    if(isSteps){
      const ord = el(`<div class="tk-ord"></div>`);
      const up = el(`<button class="tk-ib" title="вверх">↑</button>`), dn = el(`<button class="tk-ib" title="вниз">↓</button>`);
      up.disabled = idx===0; dn.disabled = idx===t.items.length-1;
      up.onclick = async()=>{ const a=t.items; [a[idx-1],a[idx]]=[a[idx],a[idx-1]]; try{ await flush(t); }catch(e){} render(); };
      dn.onclick = async()=>{ const a=t.items; [a[idx+1],a[idx]]=[a[idx],a[idx+1]]; try{ await flush(t); }catch(e){} render(); };
      ord.append(up,dn); r.appendChild(ord);
    }
    const tx = el(`<input class="tk-itext" value="${esc(it.text)}">`);
    tx.addEventListener("input", ()=>{ it.text=tx.value; schedule(t,saveEl); });
    tx.addEventListener("blur", async()=>{ if(!tx.value.trim()){ const i=t.items.indexOf(it); if(i>-1) t.items.splice(i,1); } try{ await flush(t); }catch(e){} render(); });
    r.appendChild(tx);
    const x = el(`<button class="tk-ib tk-x" title="удалить">✕</button>`);
    x.onclick = async()=>{ const i=t.items.indexOf(it); if(i>-1) t.items.splice(i,1); try{ await flush(t); }catch(e){} render(); };
    r.appendChild(x);
    row.appendChild(r);
    if(isSteps){
      const note = el(`<textarea class="tk-inote" placeholder="заметка к шагу…"></textarea>`); note.value=it.note||"";
      note.addEventListener("input", ()=>{ it.note=note.value; schedule(t,saveEl); });
      note.addEventListener("blur", ()=>{ flush(t).catch(()=>{}); });
      row.appendChild(note);
      row.appendChild(el(`<div class="tk-sfiles">файлы шага</div>`));
      if(!it.attachments) it.attachments=[];
      row.appendChild(attachEditor(t, it.attachments, saveEl));
    }
    return row;
  }

  // редактор вложений: загружает байты в Documents/Task-N/ сразу при добавлении
  function attachEditor(t, arr, saveEl){
    const box = el(`<div class="tk-att"></div>`);
    const add = el(`<button class="btn ghost tk-mini" type="button">＋ файл</button>`);
    const list = el(`<div class="tk-atts"></div>`);
    function chip(a, i){
      const c = el(`<div class="tk-chip"></div>`);
      if(tkIsImg(a)){ const img=el(`<img alt="">`); c.appendChild(img);
        tkBlobUrl(t,a.name).then(u=>{ img.src=u; }).catch(()=>{ img.remove(); }); }
      const fn = el(`<span class="fn">${esc(a.name)}</span>`); fn.onclick=()=>openAtt(t,a); c.appendChild(fn);
      const x = el(`<button class="tk-ib" type="button">✕</button>`);
      x.onclick = async()=>{ arr.splice(i,1); try{ await flush(t); if(saveEl) saveEl.textContent="сохранено"; }catch(e){} draw(); };
      c.appendChild(x); return c;
    }
    function draw(){ list.innerHTML=""; arr.forEach((a,i)=>list.appendChild(chip(a,i))); }
    add.onclick = ()=> tkPickFiles(async files=>{
      if(saveEl) saveEl.textContent="загрузка…";
      try{ await ensureDir(DOCS+"/"+t.name);
        for(const f of files){ await putBytes(DOCS+"/"+t.name+"/"+f.name, f, f.type||"application/octet-stream"); arr.push({name:f.name, type:f.type||tkGuessType(f.name)}); }
        await flush(t); if(saveEl) saveEl.textContent="сохранено";
      }catch(e){ if(saveEl) saveEl.textContent="ошибка загрузки"; alert("Не удалось загрузить файл: "+e.message); }
      draw();
    });
    box.append(add,list); draw(); return box;
  }

  // ——— переходы между папками ———
  async function moveClose(t){
    tkSetStatus(t,"done");
    try{ await putText(AR+"/"+t.fileName, tkSerialize(t)); await davDelete(A+"/"+t.fileName); }
    catch(e){ alert("Не удалось перенести в архив: "+e.message); return; }
    t._dir=AR; active=active.filter(x=>x!==t); archived.unshift(t);
    tab="archive"; view="list"; render();
  }
  async function moveReopen(t){
    tkSetStatus(t,"todo");
    try{ await putText(A+"/"+t.fileName, tkSerialize(t)); await davDelete(AR+"/"+t.fileName); }
    catch(e){ alert("Не удалось вернуть в активные: "+e.message); return; }
    t._dir=A; archived=archived.filter(x=>x!==t); active.unshift(t);
    tab="active"; view="list"; render();
  }
  async function removeTask(t){
    try{ await davDelete(fileOf(t)); }catch(e){ alert("Не удалось удалить: "+e.message); return; }
    active=active.filter(x=>x!==t); archived=archived.filter(x=>x!==t);
    view="list"; render();
  }

  // ——— создание ———
  async function createTask(draft){
    const id=nextId(), at=tkStamp(), name="Task-"+id;
    const t = { fileName:name+".md", name, id, fm:{}, title:draft.title.trim(), type:draft.type,
      opened_at:at, status:"todo", closed_at:"", history:[{status:"todo",at}],
      description: draft.type==="simple" ? (draft.description||"") : "", attachments:[],
      items: draft.type==="simple" ? [] : (draft.items||[]).filter(i=>i.text && i.text.trim()),
      intro: draft.type==="simple" ? "" : (draft.description||"").trim(), outro:"", _dir:A };
    await ensureDir(A);
    if(draft.type==="simple" && (draft.attachments||[]).length){
      await ensureDir(DOCS+"/"+name);
      for(const a of draft.attachments){ if(a.file){ await putBytes(DOCS+"/"+name+"/"+a.name, a.file, a.type||"application/octet-stream"); } t.attachments.push({name:a.name, type:a.type||tkGuessType(a.name)}); }
    }
    await tkSave(t); active.unshift(t); return t;
  }

  function openCreate(){
    const draft = { title:"", type:"checklist", description:"", attachments:[], items:[] };
    const ov = el(`<div class="modal-ov"></div>`);
    const modal = el(`<div class="modal tk-modal"></div>`);
    ov.appendChild(modal); ov.onclick=e=>{ if(e.target===ov) ov.remove(); };
    function drawM(){
      modal.innerHTML = "";
      modal.appendChild(el(`<div class="tk-sec" style="margin-top:0">Новая задача</div>`));
      const title = el(`<input class="tk-title" placeholder="Заголовок задачи…">`); title.value=draft.title;
      modal.appendChild(title);
      const seg = el(`<div class="tk-seg"></div>`);
      TK_TYPES.forEach(v=>{ const b=el(`<button class="${draft.type===v?"on":""}">${TK_TYPE_LABEL[v]}</button>`); b.onclick=()=>{ draft.type=v; drawM(); }; seg.appendChild(b); });
      modal.appendChild(seg);
      modal.appendChild(el(`<div class="tk-sec">Описание</div>`));
      const dd = el(`<textarea class="tk-desc" placeholder="Описание задачи…"></textarea>`); dd.value=draft.description; dd.addEventListener("input",()=>draft.description=dd.value);
      modal.appendChild(dd);
      if(draft.type==="simple"){
        modal.appendChild(el(`<div class="tk-sec">Файлы</div>`));
        modal.appendChild(modalAttach(draft.attachments));
      } else {
        modal.appendChild(el(`<div class="tk-sec">${draft.type==="steps"?"Шаги":"Пункты"} — можно добавить сейчас или позже</div>`));
        modal.appendChild(builder(draft));
      }
      const act = el(`<div class="tk-actions" style="border:0;margin-top:14px"></div>`);
      const create = el(`<button class="btn">Создать</button>`); create.disabled=!draft.title.trim();
      create.onclick = async()=>{ if(!draft.title.trim()) return; create.disabled=true; create.textContent="Создаю…";
        try{ const t=await createTask(draft); ov.remove(); detailName=t.name; view="detail"; render(); }
        catch(e){ create.disabled=false; create.textContent="Создать"; alert("Не удалось создать: "+e.message); } };
      const cancel = el(`<button class="btn ghost">Отмена</button>`); cancel.onclick=()=>ov.remove();
      act.append(create,cancel); modal.appendChild(act);
      title.addEventListener("input", ()=>{ draft.title=title.value; create.disabled=!draft.title.trim(); });
    }
    drawM(); document.body.appendChild(ov);
    setTimeout(()=>{ const ti=modal.querySelector(".tk-title"); if(ti) ti.focus(); }, 0);
  }

// центрирует активный элемент в горизонтальной ленте; меняет только scrollLeft контейнера
function centerInScroller(scroller, activeEl){
  if(!scroller || !activeEl) return;
  const cr = scroller.getBoundingClientRect(), er = activeEl.getBoundingClientRect();
  scroller.scrollLeft += (er.left - cr.left) - (scroller.clientWidth - activeEl.offsetWidth) / 2;
}

function moduleArtifacts(m){
  if(Array.isArray(m.artifacts) && m.artifacts.length) return m.artifacts;
  return [{ id:m.id, title:m.title||m.id, kind:m.kind, file:m.file, path:m.path }];  // одиночный артефакт = сам модуль
}
function artifactPath(m, a){
  const base = m.path || "";
  if(a.file) return base ? base + "/" + a.file : a.file;
  return a.path || base;
}

async function renderArtifact(m, a, host){
  const fp = artifactPath(m, a);
  if(!fp){ host.innerHTML=`<div class="note err">У артефакта не задан file/path в config.md</div>`; return; }
  try{
    if(a.kind==="vocabulary")      await renderVocabulary(fp, host);
    else if(a.kind==="doc")        await renderDoc(fp, host);
    else if(a.kind==="notes")      await renderNotes(fp, host);
    else if(a.kind==="roadmap")    await renderRoadmap(fp, host);
    else if(a.kind==="doclist")    await renderDocList(fp, host, a);
    else if(a.kind==="checklist")  await renderChecklist({path:fp, id:m.id}, host);
    else if(a.kind==="tasks")      await renderTasks(fp, host);
    else                           await renderFallback({path:fp, kind:a.kind, id:m.id}, host);
  }catch(e){
    const code=(String(e.message).match(/HTTP (\d+)/)||[])[1];
    host.innerHTML=`<div class="note err">${code==="404"?"Не найдено в vault — проверь путь (регистр и пробелы важны).":"Ошибка: "+esc(e.message)}</div>`;
  }
}

async function renderDoc(filePath, host){
  setCount("");
  let md;
  try{ md = await getText(filePath); }
  catch(e){
    const code=(String(e.message).match(/HTTP (\d+)/)||[])[1];
    host.innerHTML = code==="404"
      ? `<div class="empty">Файла нет: <b>${esc(filePath.split("/").pop())}</b></div>`
      : `<div class="note err">Ошибка: ${esc(e.message)}</div>`;
    return;
  }
  const wrap = el(`<div class="doc"></div>`);
  wrap.innerHTML = window.marked ? marked.parse(bodyOf(md)) : esc(bodyOf(md));
  // якоря оглавления: проставляем заголовкам id по GitHub-слагу и скроллим по клику
  const seen = {};
  wrap.querySelectorAll("h1,h2,h3,h4,h5,h6").forEach(h=>{
    let slug = slugify(h.textContent);
    if(seen[slug]!=null){ seen[slug]++; slug = slug + "-" + seen[slug]; } else seen[slug]=0;
    if(!h.id) h.id = slug;
  });
  wrap.addEventListener("click", e=>{
    const a = e.target.closest('a[href^="#"]'); if(!a) return;
    const id = decodeURIComponent(a.getAttribute("href").slice(1));
    let t=null; try{ t = wrap.querySelector("#"+CSS.escape(id)); }catch(_){}
    if(!t) t = wrap.querySelector('[id="'+id.replace(/"/g,'\\"')+'"]');
    if(t){ e.preventDefault(); t.scrollIntoView({behavior:"smooth", block:"start"}); }
  });
  host.innerHTML = "";
  host.appendChild(wrap);
}

function slugify(text){
  return (text||"").trim().toLowerCase()
    .replace(/[^\p{L}\p{N}\s-]/gu,"")   // убрать пунктуацию/эмодзи, оставить буквы (вкл. кириллицу), цифры, пробелы, дефис
    .replace(/\s/g,"-");                // каждый пробел → дефис (не схлопываем — двойные сохраняем как в оглавлении)
}

function parseNotes(md){
  const chunks = md.split(/^##\s+/m);          // [0] = преамбула, дальше блоки заметок
  return chunks.slice(1).map(p=>{
    const nl = p.indexOf("\n");
    return nl<0 ? {date:p.trim(), text:""} : {date:p.slice(0,nl).trim(), text:p.slice(nl+1).trim()};
  });
}
function serializeNotes(notes){
  let out = "# English — backlog заметок\n\n> Идеи и мысли по развитию раздела English. Claude анализирует этот файл и предлагает улучшения. Новые заметки сверху.\n\n";
  for(const n of notes) out += `## ${n.date}\n\n${n.text}\n\n`;
  return out;
}
function nowStamp(){ const d=new Date(); const p=x=>String(x).padStart(2,"0");
  return `${d.getFullYear()}-${p(d.getMonth()+1)}-${p(d.getDate())} ${p(d.getHours())}:${p(d.getMinutes())}`; }

async function renderNotes(filePath, host){
  let md = "";
  try{ md = await getText(filePath); }
  catch(e){ const code=(String(e.message).match(/HTTP (\d+)/)||[])[1]; if(code!=="404"){ host.innerHTML=`<div class="note err">Ошибка: ${esc(e.message)}</div>`; return; } }
  const notes = parseNotes(md);   // новые сверху (как в файле)
  setCount(notes.length + (notes.length===1?" note":" notes"));

  host.innerHTML = `
    <div class="compose">
      <textarea id="nText" placeholder="идея по развитию English… (что улучшить, что добавить, что попробовать)"></textarea>
      <div class="formbtns"><button class="btn" id="nAdd">Добавить заметку</button></div>
    </div>
    <div id="nList"></div>`;
  const list = host.querySelector("#nList");
  const ta = host.querySelector("#nText");

  async function save(){ await putText(filePath, serializeNotes(notes)); }

  function draw(){
    list.innerHTML = "";
    if(!notes.length){ list.innerHTML = `<div class="empty">Пока пусто — запиши первую мысль выше.</div>`; return; }
    for(const n of notes){
      const card = el(`<div class="ncard">
        <div class="ncard-top"><span class="ndate">${esc(n.date)}</span><button class="del" title="Удалить">×</button></div>
        <div class="ntext">${esc(n.text)}</div></div>`);
      card.querySelector(".del").onclick = async ()=>{
        if(!(await showConfirm("Удалить эту заметку?"))) return;
        const i = notes.indexOf(n); if(i<0) return;
        notes.splice(i,1);
        try{ await save(); setCount(notes.length+(notes.length===1?" note":" notes")); draw(); }
        catch(e){ notes.splice(i,0,n); alert("Не удалось сохранить: "+e.message); draw(); }
      };
      list.appendChild(card);
    }
  }

  host.querySelector("#nAdd").onclick = async ()=>{
    const text = ta.value.trim(); if(!text) { ta.focus(); return; }
    const btn = host.querySelector("#nAdd"); btn.disabled=true; btn.textContent="Сохраняю…";
    const note = { date: nowStamp(), text };
    notes.unshift(note);
    try{ await save(); ta.value=""; setCount(notes.length+(notes.length===1?" note":" notes")); draw(); }
    catch(e){ notes.shift(); alert("Не удалось сохранить: "+e.message); }
    finally{ btn.disabled=false; btn.textContent="Добавить заметку"; }
  };
  draw();
}

// ——— Roadmap ———
function parseRoadmap(md){
  const lines = md.split(/\r?\n/);
  const phases=[]; let cp=null, cm=null;
  const reP=/^##\s+Phase\s+(\d+)\s*[—-]\s*(.+)$/;
  const reM=/^###\s+Milestone\s+([\d.]+)\s*[—-]\s*(.+)$/;
  const reS=/^\s*-\s*\[([ xX])\]\s*\*\*([\d.]+)\*\*\s*`([SML])`\s*(.+)$/;
  for(const ln of lines){
    let m;
    if(m=ln.match(reP)){ cp={id:m[1], name:m[2].trim(), milestones:[]}; phases.push(cp); cm=null; continue; }
    if(cp && (m=ln.match(reM))){ cm={id:m[1], name:m[2].trim(), sessions:[]}; cp.milestones.push(cm); continue; }
    if(cm && (m=ln.match(reS))){
      let rest=m[4].trim();
      const tags=(rest.match(/#[\w-]+/g)||[]).map(t=>t.slice(1));
      rest=rest.replace(/#[\w-]+/g,"").trim();
      let title=rest, desc="";
      const sep=rest.indexOf(" — ");
      if(sep>=0){ title=rest.slice(0,sep).trim(); desc=rest.slice(sep+3).trim(); }
      cm.sessions.push({id:m[2], size:m[3], title, desc, tags, done:/x/i.test(m[1])});
    }
  }
  return phases;
}
function setSession(md, id, done){
  const e=id.replace(/\./g,"\\.");
  md = md.replace(new RegExp("^(\\s*-\\s*\\[)[ xX](\\]\\s*\\*\\*"+e+"\\*\\*)","m"), "$1"+(done?"x":" ")+"$2");
  md = md.replace(new RegExp("^(\\|\\s*"+e+"\\s*\\|.*\\|\\s*)(?:✅|⬜|⬛|☑️)(\\s*\\|)\\s*$","m"), "$1"+(done?"✅":"⬜")+"$2");
  return md;
}
function syncRoadmapMeta(md){
  const all=[...md.matchAll(/^\s*-\s*\[([ xX])\]\s*\*\*[\d.]+\*\*\s*`[SML]`/gm)];
  const total=all.length, done=all.filter(m=>/x/i.test(m[1])).length;
  const pct=total?Math.round(done/total*100):0;
  md=md.replace(/(sessions_completed:\s*)\d+/, "$1"+done);
  md=md.replace(/(sessions_total:\s*)\d+/, "$1"+total);
  md=md.replace(/(percent_complete:\s*)\d+/, "$1"+pct);
  const nx=[...md.matchAll(/^\s*-\s*\[ \]\s*\*\*([\d.]+)\*\*/gm)][0];
  if(nx){ const id=nx[1], pr=id.split(".");
    md=md.replace(/(next_session:\s*)"[^"]*"/, '$1"'+id+'"');
    md=md.replace(/(current_phase:\s*)\d+/, "$1"+pr[0]);
    if(pr.length>=2) md=md.replace(/(current_milestone:\s*)"[^"]*"/, '$1"'+pr[0]+"."+pr[1]+'"');
  }
  const parts = md.split(/(?=^##\s+Phase\s+\d+\b)/m);
  for(let i=0;i<parts.length;i++){
    if(/^##\s+Phase\s+\d+/.test(parts[i])){
      const dn=(parts[i].match(/^\s*-\s*\[x\]\s*\*\*[\d.]+\*\*\s*`[SML]`/gmi)||[]).length;
      parts[i]=parts[i].replace(/(\*\*Done:\*\*\s*)\d+/, "$1"+dn);
    }
  }
  return parts.join("");
}
function rmBar(d,t,n,extra){
  const on=t?Math.round(d/t*n):0;
  let b=`<div class="segbar ${extra||""}">`;
  for(let i=0;i<n;i++) b+=`<div class="seg ${i<on?"on":""}"></div>`;
  return b+`</div>`;
}
async function renderRoadmap(filePath, host){
  let raw;
  try{ raw = await getText(filePath); }
  catch(e){ const code=(String(e.message).match(/HTTP (\d+)/)||[])[1];
    host.innerHTML = code==="404" ? `<div class="empty">Нет файла <b>${esc(filePath.split("/").pop())}</b>.</div>` : `<div class="note err">Ошибка: ${esc(e.message)}</div>`; return; }
  let phases = parseRoadmap(bodyOf(raw));
  if(!phases.length){ host.innerHTML=`<div class="empty">Не удалось разобрать роадмап (нет фаз/сессий).</div>`; return; }
  let saving=false;
  const expanded=new Set(), openDesc=new Set();
  const fm=parseFrontmatter(raw)||{};
  let cur = fm.progress && fm.progress.current_phase!=null ? String(fm.progress.current_phase) : null;
  if(!cur){ const pp=phases.find(p=>p.milestones.some(m=>m.sessions.some(s=>!s.done))); cur=pp?pp.id:(phases[0]&&phases[0].id); }
  if(cur) expanded.add(cur);

  function find(id){ for(const p of phases) for(const m of p.milestones) for(const s of m.sessions) if(s.id===id) return s; return null; }
  function stat(arrFn){ let t=0,d=0; arrFn(s=>{t++; if(s.done)d++;}); return {t,d}; }
  function allStat(){ return stat(cb=>{ for(const p of phases) for(const m of p.milestones) for(const s of m.sessions) cb(s); }); }
  function phStat(p){ return stat(cb=>{ for(const m of p.milestones) for(const s of m.sessions) cb(s); }); }

  async function toggle(s){
    if(saving) return; saving=true;
    const prev=s.done; s.done=!s.done;
    raw = syncRoadmapMeta(setSession(raw, s.id, s.done));
    try{ await putText(filePath, raw); draw(); }
    catch(e){ s.done=prev; alert("Не удалось сохранить: "+e.message); }
    finally{ saving=false; }
  }

  function draw(){
    const a=allStat(); const pct=a.t?Math.round(a.d/a.t*100):0;
    setCount(a.d+" / "+a.t);
    let h=`<div class="rm-dash"><div class="rm-overall"><span class="rm-pct">${pct}%</span><span class="rm-sub">${a.d} / ${a.t} sessions</span></div>${rmBar(a.d,a.t,24)}</div>`;
    for(const p of phases){
      const ps=phStat(p); const open=expanded.has(p.id);
      h+=`<div class="rm-phase ${open?"open":""}">
        <div class="rm-phead" data-ph="${esc(p.id)}">
          <span class="pn">Phase ${esc(p.id)} · ${esc(p.name)}</span>
          <span class="pc">${ps.d}/${ps.t}</span><span class="rm-chev">${open?"−":"+"}</span>
        </div>
        ${rmBar(ps.d,ps.t,20,"rm-pbar")}`;
      if(open){
        h+=`<div class="rm-body">`;
        for(const ms of p.milestones){
          h+=`<div class="rm-ms">${esc(ms.id)} · ${esc(ms.name)}</div>`;
          for(const s of ms.sessions){
            const od=openDesc.has(s.id);
            h+=`<div class="rm-s">
              <button class="rm-cb ${s.done?"done":""}" data-cb="${esc(s.id)}">${s.done?"✓":""}</button>
              <div class="rm-smain" data-s="${esc(s.id)}">
                <div class="rm-stitle">${esc(s.title)}</div>
                <div class="rm-smeta"><span class="rm-size">${esc(s.size)}</span> · ${esc(s.id)}${s.tags.length?" · "+esc(s.tags.map(t=>"#"+t).join(" ")):""}</div>
                ${od&&s.desc?`<div class="rm-sdesc">${esc(s.desc)}</div>`:""}
              </div></div>`;
          }
        }
        h+=`</div>`;
      }
      h+=`</div>`;
    }
    host.innerHTML=h;
    host.querySelectorAll(".rm-phead").forEach(e=>e.onclick=()=>{ const id=e.dataset.ph; expanded.has(id)?expanded.delete(id):expanded.add(id); draw(); });
    host.querySelectorAll(".rm-cb").forEach(e=>e.onclick=(ev)=>{ ev.stopPropagation(); const s=find(e.dataset.cb); if(s) toggle(s); });
    host.querySelectorAll(".rm-smain").forEach(e=>e.onclick=()=>{ const id=e.dataset.s; openDesc.has(id)?openDesc.delete(id):openDesc.add(id); draw(); });
  }
  draw();
}

async function renderModule(m, host){
  const arts = moduleArtifacts(m);
  let a = arts.find(x=>x.id===activeArtifact) || arts[0];
  activeArtifact = a.id;

  host.innerHTML = "";
  if(arts.length > 1){
    const st = el(`<div class="subtabs"></div>`);
    let activeSubEl = null;
    arts.forEach(x=>{
      const b = el(`<button class="subtab ${x.id===a.id?"active":""}">${esc(x.title||x.id)}</button>`);
      if(x.id===a.id) activeSubEl = b;
      b.onclick = ()=>{ activeArtifact = x.id; renderModule(m, host); };
      st.appendChild(b);
    });
    host.appendChild(st);
    centerInScroller(st, activeSubEl);
  }
  const content = el(`<div id="artContent"><div class="loading"><div class="spin"></div> reading…</div></div>`);
  host.appendChild(content);
  renderArtifact(m, a, content);
}

    if(!cand.password){ c.querySelector("#f_err").textContent="Введи пароль."; return; }
    go.disabled=true; go.textContent="Проверяю…"; conn=cand;
    try{ modules=await loadConfig(); saveConn(cand); activeId=modules.length?modules[0].id:null; viewApp(); }
    catch(e){ conn=null; go.disabled=false; go.textContent="Войти"; c.querySelector("#f_err").textContent="Не вышло: "+e.message; }
  };
  const pass=c.querySelector("#f_pass");
  pass.addEventListener("keydown", e=>{ if(e.key==="Enter") go.click(); });
  pass.focus();
}

async function boot(){
  conn = loadConn();
  if(!conn){ viewSetup(); return; }
  root.innerHTML=`<div class="center"><div class="loading"><div class="spin"></div> loading config…</div></div>`;
  try{ modules=await loadConfig(); activeId=modules.length?modules[0].id:null; viewApp(); }
  catch(e){ viewSetup(conn); }
}

// перечитать текущий раздел с WebDAV (для pull-to-refresh)
async function appRefresh(){
  if(!conn) return;
  const m = modules.find(x=>x.id===activeId);
  const host = document.getElementById("content");
  if(m && host) await renderModule(m, host);
}
// кнопка «наверх»: видна, когда страница прокручена не от самого верха
(function(){
  const btn = document.getElementById("toTop");
  if(!btn) return;
  const SHOW_AT = 8; // «scroll offset не 0» — крошечный порог гасит дрожание у самой кромки
  const upd = ()=>{ btn.classList.toggle("show", window.scrollY > SHOW_AT); };
  window.addEventListener("scroll", upd, {passive:true});
  window.addEventListener("resize", upd, {passive:true});
  btn.addEventListener("click", ()=> window.scrollTo({top:0, behavior:"smooth"}));
  upd();
})();

// pull-to-refresh: тянем вниз от самого верха → отпускаем за порогом → appRefresh()
(function(){
  const ind = document.getElementById("ptr"); if(!ind) return;
  const TRIG = 70, MAX = 110, DAMP = 0.5;
  let startY = 0, pulling = false, dist = 0, refreshing = false;
  const scrollTop = ()=> window.scrollY || document.documentElement.scrollTop || 0;
  const canPTR = ()=> !!conn && !refreshing && !!document.getElementById("content");

  window.addEventListener("touchstart", e=>{
    if(!canPTR() || e.touches.length!==1 || scrollTop()>0){ pulling=false; return; }
    startY = e.touches[0].clientY; pulling = true; dist = 0;
    ind.style.transition = "none";
  }, {passive:true});

  window.addEventListener("touchmove", e=>{
    if(!pulling) return;
    const dy = e.touches[0].clientY - startY;
    if(dy<=0 || scrollTop()>0){ pulling=false; dist=0; ind.style.transform="translateX(-50%) translateY(-100%)"; return; }
    dist = Math.min(MAX, dy*DAMP);
    if(e.cancelable) e.preventDefault();   // гасим нативный скролл/баунс, пока тянем
    ind.style.transform = `translateX(-50%) translateY(${dist}px)`;
    ind.classList.toggle("ready", dist>=TRIG);
  }, {passive:false});

  async function release(){
    if(!pulling) return; pulling=false;
    ind.style.transition = "transform .2s ease";
    if(dist>=TRIG && canPTR()){
      refreshing = true;
      ind.classList.remove("ready"); ind.classList.add("spin-on");
      ind.style.transform = "translateX(-50%) translateY(58px)";
      try{ await appRefresh(); }catch(e){}
      finally{ refreshing=false; ind.classList.remove("spin-on"); ind.style.transform="translateX(-50%) translateY(-100%)"; }
    } else {
      ind.classList.remove("ready");
      ind.style.transform = "translateX(-50%) translateY(-100%)";
    }
    dist = 0;
  }
  window.addEventListener("touchend", release, {passive:true});
  window.addEventListener("touchcancel", release, {passive:true});
})();

boot();
</script>
